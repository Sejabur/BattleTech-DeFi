[profile.default]
chain_id = 8453
solc_version = "0.8.26+commit.8a97fa7a"
rpc_url = "$RPC_URL"
optimizer = true
viaIR = true

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@uniswap/universal-router/=lib/universal-router/",
  "@uniswap/v2-core/=lib/v2-core/",
  "@uniswap/v3-core/=lib/v3-core/",
  "@uniswap/v4-core/=lib/v4-core/",
  "permit2/=lib/universal-router/lib/permit2/",
  "@uniswap/v4-periphery/=lib/universal-router/lib/v4-periphery/",
  "@uniswap/v3-periphery/=lib/universal-router/lib/v3-periphery/",
  "solmate/=lib/universal-router/lib/solmate/"
]
